# This workflow is used to coordinate releases and version bumps for the entire project.
# It is used to ensure that the project is released in a consistent and predictable manner.
# Triggered on a push to the main branch. bump

name: Main Release Workflow

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  deployments: write

jobs:

  version:
    name: Bump version
    runs-on: [self-hosted, linux, x64]
    needs: []
    outputs:
      version_bumped: ${{ steps.bump.outputs.version_bumped }}
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read current version
        id: read_version
        run: |
          CURRENT="0.0.0"
          if [ -f version.json ]; then
            C=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' version.json)
            [ -n "$C" ] && CURRENT="$C"
          fi
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT"

      - name: Parse conventional commits and compute bump
        id: bump
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
        run: |
          set -e
          CURRENT="${{ steps.read_version.outputs.current }}"
          # Commits in this push (single commit if initial push)
          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            REVLIST=$(git rev-parse HEAD)
          else
            REVLIST=$(git rev-list "$BEFORE..$AFTER")
          fi
          # Avoid infinite loop: if this push is only our own "chore: bump version to X.Y.Z" commit(s), do not bump again
          ONLY_BOT_BUMP=true
          for hash in $REVLIST; do
            author=$(git log -1 "$hash" --format=%ae)
            subject=$(git log -1 "$hash" --pretty=%s)
            case "$author" in
              github-actions[bot]@users.noreply.github.com|41898282+github-actions[bot]@users.noreply.github.com) ;;
              *) ONLY_BOT_BUMP=false; break ;;
            esac
            if ! echo "$subject" | grep -qE '^chore: bump version to [0-9]+\.[0-9]+\.[0-9]+$'; then
              ONLY_BOT_BUMP=false
              break
            fi
          done
          if [ "$ONLY_BOT_BUMP" = "true" ] && [ -n "$REVLIST" ]; then
            echo "version_bumped=false" >> "$GITHUB_OUTPUT"
            echo "new_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "Skip: push only contains bot version-bump commit(s); no new release to avoid loop."
            exit 0
          fi
          # Per commit: 3=major, 2=minor, 1=patch, 0=none (chore / no conventional)
          MAX_BUMP=0
          for hash in $REVLIST; do
            body=$(git log -1 "$hash" --pretty=%B)
            first=$(echo "$body" | head -1)
            bump=0
            if echo "$body" | grep -q 'BREAKING CHANGE'; then bump=3; fi
            if [ "$bump" -lt 3 ] && echo "$first" | grep -qE '^(feat|fix)!'; then bump=3; fi
            if [ "$bump" -lt 2 ] && echo "$first" | grep -qE '^feat(\s*\([^)]*\))?:'; then bump=2; fi
            if [ "$bump" -lt 1 ] && echo "$first" | grep -qE '^fix(\s*\([^)]*\))?:'; then bump=1; fi
            [ "$bump" -gt "$MAX_BUMP" ] && MAX_BUMP=$bump
          done
          # Apply bump to current version
          IFS=. read -r major minor patch <<< "$CURRENT"
          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}
          if [ "$MAX_BUMP" -eq 3 ]; then
            major=$((major + 1)); minor=0; patch=0
          elif [ "$MAX_BUMP" -eq 2 ]; then
            minor=$((minor + 1)); patch=0
          elif [ "$MAX_BUMP" -eq 1 ]; then
            patch=$((patch + 1))
          fi
          if [ "$MAX_BUMP" -ge 1 ]; then
            NEW_VERSION="$major.$minor.$patch"
            echo "version_bumped=true" >> "$GITHUB_OUTPUT"
            echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
            echo "Bump type: $([ "$MAX_BUMP" -eq 3 ] && echo major || [ "$MAX_BUMP" -eq 2 ] && echo minor || echo patch) -> $NEW_VERSION"
          else
            echo "version_bumped=false" >> "$GITHUB_OUTPUT"
            echo "new_version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "No conventional bump (chore/other); version unchanged: $CURRENT"
          fi

  persist-version:
    name: Update version.json and open PR
    runs-on: [self-hosted, linux, x64]
    needs: [version]
    if: needs.version.outputs.version_bumped == 'true'
    steps:
      - name: Require PR token (GITHUB_TOKEN cannot create PRs in this repo)
        env:
          VERSION_BUMP_TOKEN: ${{ secrets.VERSION_BUMP_TOKEN }}
        run: |
          set -e
          if [ -z "$VERSION_BUMP_TOKEN" ]; then
            echo "::error::Missing repository secret VERSION_BUMP_TOKEN. GitHub Actions is not permitted to create pull requests with GITHUB_TOKEN in this repository, so configure a PAT/bot token with contents:write + pull-requests:write (and membership on this repo), then add it as VERSION_BUMP_TOKEN."
            exit 1
          fi

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.VERSION_BUMP_TOKEN }}

      - name: Update version.json
        run: |
          NEW_VERSION="${{ needs.version.outputs.new_version }}"
          # Write version.json (portable: no jq)
          echo "{\"version\": \"$NEW_VERSION\"}" > version.json
          cat version.json

      - name: Create version bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.VERSION_BUMP_TOKEN }}
          commit-message: "chore: bump version to ${{ needs.version.outputs.new_version }}"
          title: "chore: bump version to ${{ needs.version.outputs.new_version }}"
          body: |
            Automated version bump generated by the release workflow.
          branch: ci/version-bump-${{ needs.version.outputs.new_version }}
          base: main
          add-paths: |
            version.json

  release:
    name: Create GitHub release
    runs-on: [self-hosted, linux, x64]
    needs: [version, persist-version]
    if: needs.version.outputs.version_bumped == 'true'
    steps:
      - name: Checkout main (with version bump commit)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create release (draft for release notes)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.version.outputs.new_version }}
          name: v${{ needs.version.outputs.new_version }}
          body: |
            ## Release notes
            Edit this draft release to add your release notes, then publish.
          draft: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

